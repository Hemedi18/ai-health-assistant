{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>AI Health Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root{
            --primary: #667eea;
            --secondary: #764ba2;
            --bg-light: #f8fafc;
            --border-light: #e6e9f2;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --success: #16a34a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; font-family: 'Poppins', sans-serif; color: var(--text-dark); background: #fff; }

        .chat-container { min-height: 100vh; display: flex; flex-direction: column; }

        /* Sidebar - Hidden on mobile, shown on desktop */
        .sidebar {
            display: none;
            width: 280px;
            background: white;
            border-right: 1px solid var(--border-light);
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            animation: slideInLeft 0.4s ease;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            z-index: 1200;
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .sidebar-header h3 {
            font-size: 15px;
            margin-bottom: 12px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .symptom-btn { margin-top: 8px; display: flex; gap: 8px; align-items: center; justify-content: center; }

        /* Symptom assessment form styles */
        .symptom-form { background: rgba(255,255,255,0.98); padding: 12px; border-radius: 10px; box-shadow: 0 6px 18px rgba(2,6,23,0.06); margin: 12px; }
        .symptom-qa-list { max-height: 160px; overflow:auto; padding-bottom:6px; }
        .symptom-qa-item { padding:8px; border-radius:8px; background: #f1f5f9; margin-bottom:6px; font-size:13px; }
        .symptom-question { font-size:14px; color: var(--text-dark); }
        .symptom-choices { display:flex; flex-direction:column; gap:8px; margin-top:8px; }

        .new-chat-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .history-item {
            padding: 12px 15px;
            margin: 5px 8px;
            background: var(--bg-light);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .history-item:hover {
            background: #e0e7ff;
            color: var(--primary);
        }

        .history-item.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .sidebar-footer {
            padding: 15px;
            border-top: 1px solid var(--border-light);
            font-size: 13px;
        }

        /* Mobile show/hide */
        .sidebar.open {
            transform: translateX(0);
            display: flex;
        }

        .history-toggle {
            display: none;
            background: transparent;
            border: none;
            color: var(--primary);
            font-size: 18px;
            cursor: pointer;
            margin-right: 8px;
        }

        body.no-scroll { overflow: hidden; }

        @media (max-width: 767px) {
            .history-toggle { display: inline-flex; align-items: center; justify-content: center; }
            .sidebar { width: 85%; max-width: 320px; }
        }

            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.45);
                z-index: 1100;
                opacity: 0;
                transition: opacity 0.18s ease;
            }

            .sidebar-overlay.visible { display: block; opacity: 1; }

        /* Main Chat */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #f8fafc, white);
            animation: slideInUp 0.4s ease;
            overflow: hidden;
        }

        @keyframes slideInUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .chat-header {
            padding: 12px 15px;
            background: white;
            border-bottom: 2px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            min-height: 50px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .header-title h2 {
            font-size: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: var(--success);
            background: rgba(74, 222, 128, 0.1);
            padding: 4px 8px;
            border-radius: 20px;
            flex-shrink: 0;
        }

        .dot {
            width: 4px;
            height: 4px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 3px;
        }

        .welcome-section {
            text-align: center;
            padding: 30px 15px 20px;
            color: var(--text-light);
        }

        .welcome-icon {
            font-size: 36px;
            color: var(--primary);
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .welcome-text {
            font-size: 13px;
            line-height: 1.4;
        }

        .quick-questions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-width: 100%;
            margin: 15px auto 0;
            padding: 0 10px;
        }

        .question-btn {
            padding: 8px 10px;
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
            text-align: center;
            line-height: 1.3;
            word-wrap: break-word;
        }

        .question-btn:active {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.05);
            color: var(--primary);
            transform: scale(0.98);
        }

        .message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease;
            max-width: 100%;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-msg {
            justify-content: flex-start;
        }

        .user-msg {
            justify-content: flex-end;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
            font-size: 12px;
        }

        .ai-msg .avatar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .user-msg .avatar {
            background: #e0e7ff;
            color: var(--primary);
        }

        .bubble {
            max-width: 99%;
            padding: 10px 12px;
            border-radius: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            font-size: 13px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .ai-msg .bubble {
            background: white;
            color: var(--text-dark);
            border: 1px solid var(--border-light);
        }

        .user-msg .bubble {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .bubble p { margin: 6px 0; }
        .bubble p:first-child { margin-top: 0; }
        .bubble p:last-child { margin-bottom: 0; }

        .bubble strong {
            font-weight: 600;
        }

        .typing {
            display: flex;
            gap: 3px;
            padding: 10px 12px;
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 14px;
            width: fit-content;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .input-area {
            padding: 10px 10px 12px;
            background: white;
            border-top: 1px solid var(--border-light);
            flex-shrink: 0;
        }

        .input-form {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-light);
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            transition: all 0.2s;
            resize: none;
            min-height: 36px;
            max-height: 100px;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .input-field::placeholder {
            color: var(--text-light);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ========== TABLET (768px - 1024px) ========== */
        @media (min-width: 768px) {
            .chat-container {
                flex-direction: row;
            }

            /* On tablet+ keep sidebar visible and remove mobile positioning */
            .sidebar {
                display: flex;
                position: static;
                transform: none !important;
                transition: none !important;
                width: 280px;
                box-shadow: 2px 0 10px rgba(0,0,0,0.03);
            }

            .chat-header {
                padding: 16px 20px;
                min-height: 60px;
            }

            .header-title h2 {
                font-size: 16px;
            }

            .messages {
                padding: 20px;
                gap: 12px;
            }

            .bubble {
                max-width: 90%;
                padding: 12px 16px;
                font-size: 14px;
            }

            .quick-questions {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                padding: 0 15px;
            }

            .question-btn {
                padding: 10px 12px;
                font-size: 12px;
            }

            .input-area {
                padding: 15px 20px;
            }

            .input-field {
                padding: 11px 16px;
                font-size: 14px;
                min-height: 40px;
            }

            .send-btn {
                width: 40px;
                height: 40px;
                font-size: 17px;
            }
        }

        /* ========== DESKTOP (1024px+) ========== */
        @media (min-width: 1024px) {
            .chat-header {
                padding: 18px 24px;
            }

            .header-title h2 {
                font-size: 18px;
            }

            .messages {
                padding: 25px;
                gap: 15px;
            }

            .bubble {
                max-width: 85%;
                padding: 14px 18px;
                font-size: 14px;
            }

            .quick-questions {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
                max-width: 700px;
            }

            .question-btn {
                padding: 12px 14px;
                font-size: 12px;
            }

            .input-area {
                padding: 18px 24px;
            }

            .input-field {
                padding: 12px 18px;
                font-size: 14px;
            }

            .send-btn {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }

            .send-btn:hover:not(:disabled) {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            }
        }

        /* ========== SMALL PHONES (< 375px) ========== */
        @media (max-width: 375px) {
            .header-title h2 {
                font-size: 12px;
            }

            .status-badge {
                display: none;
            }

            .bubble {
                max-width: 98%;
                padding: 8px 10px;
                font-size: 12px;
            }

            .quick-questions {
                gap: 6px;
                padding: 0 8px;
            }

            .question-btn {
                padding: 6px 8px;
                font-size: 10px;
            }

            .messages {
                padding: 12px 8px;
                gap: 8px;
            }

            .input-area {
                padding: 8px 8px 10px;
            }

            .input-form {
                gap: 6px;
            }

            .input-field {
                padding: 8px 10px;
                font-size: 12px;
                min-height: 32px;
            }

            .send-btn {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-history"></i> Chat History</h3>
                <button class="new-chat-btn" onclick="newChat()">
                    <i class="fas fa-plus"></i> New Chat
                </button>
                <button class="new-chat-btn symptom-btn" onclick="startSymptomAssessment()" title="Start symptom checker">
                    <i class="fas fa-notes-medical"></i> Symptom Checker
                </button>
            </div>
            <div class="chat-history">
                <div class="history-item active">Health Chat</div>
            </div>
            <div class="sidebar-footer">
                <div style="color: var(--text-light);"><i class="fas fa-user-circle"></i> Health User</div>
            </div>
        </aside>

        <!-- Main Chat -->
        <div class="chat-main">
            <header class="chat-header">
                <div class="header-title">
                        <button class="history-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                        <i class="fas fa-robot" style="color: var(--primary); font-size: 20px;"></i>
                        <h2>AI Health Assistant</h2>
                        <div class="status-badge">
                            <div class="dot"></div>
                            <span>Ready</span>
                        </div>
                    </div>
            </header>

            <div class="messages" id="messages">
                <div class="welcome-section">
                    <div class="welcome-icon"><i class="fas fa-heart-pulse"></i></div>
                    <h3 style="color: var(--text-dark); margin-bottom: 10px;">Welcome to Your AI Health Assistant</h3>
                    <p>Ask me anything about health, wellness, nutrition, or exercise.</p>
                    <div class="quick-questions">
                        <button class="question-btn" onclick="askQuestion('💪 Give me exercise tips')">💪 Exercise</button>
                        <button class="question-btn" onclick="askQuestion('🥗 Nutrition advice')">🥗 Nutrition</button>
                        <button class="question-btn" onclick="askQuestion('😴 How to sleep better')">😴 Better Sleep</button>
                        <button class="question-btn" onclick="askQuestion('🧘 Stress management')">🧘 Stress</button>
                        <button class="question-btn" onclick="askQuestion('❤️ Heart health tips')">❤️ Heart</button>
                        <button class="question-btn" onclick="askQuestion('⚖️ Weight loss guide')">⚖️ Weight</button>
                    </div>
                </div>
            </div>

            <!-- Symptom assessment form (hidden until activated) -->
            <div id="symptom-form" class="symptom-form" style="display:none;">
                <div id="symptom-qa-list" class="symptom-qa-list"></div>
                <div id="symptom-question" class="symptom-question" style="margin:8px 0; font-weight:600;"></div>
                <form id="symptom-form-el" onsubmit="submitSymptomForm(event)">
                    <div id="symptom-choices" class="symptom-choices"></div>
                    <input id="symptom-free-input" class="input-field" style="margin-top:8px; display:none;" placeholder="Type your answer here...">
                    <div style="display:flex; gap:8px; margin-top:8px;">
                        <button type="submit" class="new-chat-btn" style="flex:1;">Next</button>
                        <button type="button" class="new-chat-btn" style="background:rgba(255,255,255,0.08); color:white;" onclick="cancelSymptomAssessment()">Cancel</button>
                    </div>
                </form>
                <div id="symptom-result" style="margin-top:12px;"></div>
            </div>

            <div class="input-area">
                <form class="input-form" onsubmit="sendMessage(event)">
                    {% csrf_token %}
                    <input type="text" class="input-field" id="input" placeholder="Type your question..." autocomplete="off">
                    <button type="submit" class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let chatStarted = false;

        function askQuestion(q) {
            document.getElementById('input').value = q;
            sendMessage({preventDefault: () => {}});
        }

        async function sendMessage(e) {
            e.preventDefault?.();
            const msg = document.getElementById('input').value.trim();
            if (!msg) return;

            if (!chatStarted) {
                document.getElementById('messages').innerHTML = '';
                chatStarted = true;
            }

            addMsg(msg, 'user');
            document.getElementById('input').value = '';

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;

            const typingId = addTyping();

            try {
                // Get CSRF token from the hidden input field (Django's {% csrf_token %} tag)
                const csrfInput = document.querySelector('[name="csrfmiddlewaretoken"]');
                const csrfToken = csrfInput ? csrfInput.value : null;
                console.log('CSRF Token found:', !!csrfToken, csrfToken ? csrfToken.substring(0, 20) + '...' : 'null');
                
                const res = await fetch('/chat/api/send/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken || ''
                    },
                    body: JSON.stringify({message: msg})
                });

                console.log('Response status:', res.status);
                console.log('Response ok:', res.ok);

                const responseText = await res.text();
                console.log('Raw response:', responseText.substring(0, 200));
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseErr) {
                    console.error('JSON parse error:', parseErr);
                    throw new Error('Invalid JSON response');
                }

                removeMsg(typingId);

                if (data.error) {
                    addMsg('Error: ' + data.error, 'ai');
                } else if (data.response) {
                    addMsg(data.response, 'ai');
                } else {
                    addMsg('No response from AI. Please try again.', 'ai');
                    console.error('Unexpected response:', data);
                }
            } catch (err) {
                removeMsg(typingId);
                console.error('Chat error:', err);
                console.error('Stack:', err.stack);
                addMsg('Error: ' + err.message, 'ai');
            } finally {
                btn.disabled = false;
                document.getElementById('input').focus();
            }
        }

        function addMsg(text, sender) {
            const m = document.createElement('div');
            m.className = `message ${sender === 'ai' ? 'ai-msg' : 'user-msg'}`;

            const av = document.createElement('div');
            av.className = 'avatar';
            av.innerHTML = sender === 'ai' ? '<i class="fas fa-robot"></i>' : '<i class="fas fa-user"></i>';

            const b = document.createElement('div');
            b.className = 'bubble';
            if (sender === 'ai' && typeof marked !== 'undefined') {
                b.innerHTML = marked.parse(text);
            } else {
                b.textContent = text;
            }

            if (sender === 'ai') {
                m.appendChild(av);
                m.appendChild(b);
            } else {
                m.appendChild(b);
                m.appendChild(av);
            }

            document.getElementById('messages').appendChild(m);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function addTyping() {
            const id = 'typ' + Date.now();
            const m = document.createElement('div');
            m.className = 'message ai-msg';
            m.id = id;

            const av = document.createElement('div');
            av.className = 'avatar';
            av.innerHTML = '<i class="fas fa-robot"></i>';

            const b = document.createElement('div');
            b.className = 'bubble typing';
            b.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

            m.appendChild(av);
            m.appendChild(b);
            document.getElementById('messages').appendChild(m);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            return id;
        }

        function removeMsg(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        

        function getCookie(name) {
            let cv = null;
            if (document.cookie) {
                document.cookie.split(';').forEach(c => {
                    const [n, v] = c.trim().split('=');
                    if (n === name) cv = decodeURIComponent(v);
                });
            }
            return cv;
        }

        let currentSessionId = null;

        // Load chat sessions list
        async function loadChatSessions() {
            try {
                const res = await fetch('/chat/api/history/', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    if (data.sessions && data.sessions.length > 0) {
                        displaySessionsList(data.sessions);
                        // Load the most recent session by default
                        if (data.sessions.length > 0) {
                            await loadSession(data.sessions[0].id);
                        }
                    }
                }
            } catch (err) {
                console.log('Sessions not available (user not logged in)');
            }
        }

        // Display sessions in sidebar
        function displaySessionsList(sessions) {
            const historyDiv = document.querySelector('.chat-history');
            if (!historyDiv) return;
            
            historyDiv.innerHTML = '';
            sessions.forEach(session => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.textContent = session.title ? (session.title.substring(0, 30) + (session.title.length > 30 ? '...' : '')) : 'Untitled Chat';

                if (session.id === currentSessionId) item.classList.add('active');

                item.onclick = async () => {
                    await loadSession(session.id);
                    // update active state
                    document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    // auto-close sidebar on small screens
                    if (window.innerWidth < 768) {
                        const sb = document.querySelector('.sidebar');
                        if (sb && sb.classList.contains('open')) toggleSidebar();
                    }
                };

                historyDiv.appendChild(item);
            });
        }

        // Load specific session
        async function loadSession(sessionId) {
            try {
                const res = await fetch(`/chat/api/sessions/${sessionId}/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    currentSessionId = sessionId;
                    document.getElementById('messages').innerHTML = '';
                    chatStarted = true;
                    
                    // Display all messages from session
                    if (data.messages && data.messages.length > 0) {
                        data.messages.forEach(msg => {
                            addMsg(msg.content, msg.message_type);
                        });
                    }
                    
                    // Scroll to bottom
                    setTimeout(() => {
                        const messagesDiv = document.getElementById('messages');
                        messagesDiv.scrollTop = messagesDiv.scrollHeight;
                    }, 100);
                }
            } catch (err) {
                console.log('Error loading session:', err);
            }
        }

        // Start new chat
        async function newChat() {
            try {
                const res = await fetch('/chat/api/new-session/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('[name="csrfmiddlewaretoken"]')?.value || ''
                    }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    currentSessionId = data.session_id;
                    document.getElementById('messages').innerHTML = `
                        <div class="welcome-section">
                            <div class="welcome-icon"><i class="fas fa-heart-pulse"></i></div>
                            <h3 style="color: var(--text-dark); margin-bottom: 10px;">Welcome to Your AI Health Assistant</h3>
                            <p>Ask me anything about health, wellness, nutrition, or exercise.</p>
                            <div class="quick-questions">
                                <button class="question-btn" onclick="askQuestion('💪 Give me exercise tips')">💪 Exercise</button>
                                <button class="question-btn" onclick="askQuestion('🥗 Nutrition advice')">🥗 Nutrition</button>
                                <button class="question-btn" onclick="askQuestion('😴 How to sleep better')">😴 Sleep</button>
                                <button class="question-btn" onclick="askQuestion('🧘 Stress management')">🧘 Stress</button>
                                <button class="question-btn" onclick="askQuestion('❤️ Heart health tips')">❤️ Heart</button>
                                <button class="question-btn" onclick="askQuestion('⚖️ Weight loss guide')">⚖️ Weight</button>
                            </div>
                        </div>
                    `;
                    // close mobile sidebar if open
                    document.querySelector('.sidebar')?.classList.remove('open');
                    chatStarted = false;
                    document.getElementById('input').value = '';
                    document.getElementById('input').focus();
                    
                    // Reload sessions list
                    loadChatSessions();
                }
            } catch (err) {
                console.log('Error creating new session:', err);
            }
        }

        // Symptom assessment flow state
        let symptomMode = false;
        let symptomContext = null;

        // Start symptom assessment: ask user to describe their main problem
        function startSymptomAssessment() {
            symptomMode = true;
            symptomContext = null;
            addMsg('I can help with a symptom assessment. Please briefly describe your main health problem in a sentence or two.', 'ai');
            document.getElementById('input').focus();
        }

        // Send payload to symptom API and handle response
        async function sendSymptomPayload(action, text) {
            const csrfInput = document.querySelector('[name="csrfmiddlewaretoken"]');
            const csrfToken = csrfInput ? csrfInput.value : '';

            try {
                const res = await fetch('/chat/api/symptom-assess/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ action: action, text: text, context: symptomContext })
                });

                if (!res.ok) {
                    const txt = await res.text();
                    addMsg('Error from assessment service: ' + txt, 'ai');
                    symptomMode = false;
                    return;
                }

                const data = await res.json();
                symptomContext = data.context || {};
                handleSymptomResponse(data);
            } catch (err) {
                addMsg('Assessment error: ' + err.message, 'ai');
                symptomMode = false;
            }
        }

        // Render assistant response for symptom flow
        function handleSymptomResponse(resp) {
            if (!resp) return;

            // Emergency: show prominently in the form result area
            if (resp.type === 'emergency') {
                showSymptomForm();
                const resDiv = document.getElementById('symptom-result');
                resDiv.innerHTML = `<div style="color:#8b0000; font-weight:700;">${resp.text.replace(/\n/g, '<br>')}</div>`;
                symptomMode = false;
                return;
            }

            if (resp.type === 'question') {
                showSymptomForm();
                renderQuestion(resp);
                return;
            }

            if (resp.type === 'result') {
                showSymptomForm();
                // display final structured result in the form area
                const resDiv = document.getElementById('symptom-result');
                resDiv.innerHTML = '';
                if (resp.text) resDiv.innerHTML += `<div style="font-weight:700; margin-bottom:8px;">${resp.text.replace(/\n/g,'<br>')}</div>`;
                const details = resp.details || {};
                if (details.guidance) {
                    const g = details.guidance;
                    if (g.more_consistent && g.more_consistent.length) {
                        resDiv.innerHTML += `<div style="margin-top:6px;"><strong>More consistent with:</strong><br>${g.more_consistent.map(x => '- ' + x.name).join('<br>')}</div>`;
                    }
                    if (g.somewhat_consistent && g.somewhat_consistent.length) {
                        resDiv.innerHTML += `<div style="margin-top:6px;"><strong>Somewhat consistent with:</strong><br>${g.somewhat_consistent.map(x => '- ' + x.name).join('<br>')}</div>`;
                    }
                    if (g.less_consistent && g.less_consistent.length) {
                        resDiv.innerHTML += `<div style="margin-top:6px;"><strong>Less consistent with:</strong><br>${g.less_consistent.map(x => '- ' + x.name).join('<br>')}</div>`;
                    }
                    if (g.what_to_do_now && g.what_to_do_now.length) {
                        resDiv.innerHTML += `<div style="margin-top:8px;"><strong>Self-care suggestions:</strong><br>${g.what_to_do_now.map(s => '- ' + s).join('<br>')}</div>`;
                    }
                }
                if (details.urgency_notes && details.urgency_notes.length) {
                    resDiv.innerHTML += `<div style="margin-top:8px;"><strong>When to seek care:</strong><br>${details.urgency_notes.map(s => '- ' + s).join('<br>')}</div>`;
                }

                symptomMode = false;
                return;
            }

            // Fallback: show as plain text in form area
            if (resp.text) {
                showSymptomForm();
                document.getElementById('symptom-question').innerText = resp.text;
                document.getElementById('symptom-choices').innerHTML = '';
                document.getElementById('symptom-free-input').style.display = 'block';
            }
        }

        // Show/hide symptom form helpers
        function showSymptomForm() {
            document.getElementById('symptom-form').style.display = 'block';
            document.getElementById('symptom-result').innerHTML = '';
            document.getElementById('symptom-choices').innerHTML = '';
            document.getElementById('symptom-free-input').value = '';
        }

        function hideSymptomForm() {
            document.getElementById('symptom-form').style.display = 'none';
            document.getElementById('symptom-qa-list').innerHTML = '';
            document.getElementById('symptom-result').innerHTML = '';
            symptomContext = null;
            symptomMode = false;
        }

        function cancelSymptomAssessment() {
            hideSymptomForm();
        }

        // Render a question into the form area
        function renderQuestion(resp) {
            const qEl = document.getElementById('symptom-question');
            const choicesEl = document.getElementById('symptom-choices');
            const freeInput = document.getElementById('symptom-free-input');

            qEl.innerText = resp.text || '';
            choicesEl.innerHTML = '';
            freeInput.style.display = 'none';

            const multi = (resp.choices && resp.choices.length > 0 && /choose all/i.test((resp.text||'')));

            if (resp.choices && resp.choices.length > 0) {
                resp.choices.forEach((c, idx) => {
                    const id = 'sym_choice_' + idx + '_' + Date.now();
                    const wrap = document.createElement('label');
                    wrap.style.display = 'flex';
                    wrap.style.alignItems = 'center';
                    wrap.style.gap = '8px';
                    const inp = document.createElement('input');
                    inp.type = multi ? 'checkbox' : 'radio';
                    inp.name = 'symptom_choice';
                    inp.value = c;
                    inp.id = id;
                    const span = document.createElement('span');
                    span.innerText = c;
                    wrap.appendChild(inp);
                    wrap.appendChild(span);
                    choicesEl.appendChild(wrap);
                });
            } else {
                freeInput.style.display = 'block';
                freeInput.focus();
            }
        }

        // Handle the symptom form submission
        function submitSymptomForm(e) {
            e.preventDefault();
            const choicesEl = document.getElementById('symptom-choices');
            const freeInput = document.getElementById('symptom-free-input');
            let answer = '';

            if (choicesEl && choicesEl.children.length > 0) {
                const inputs = choicesEl.querySelectorAll('input');
                const selected = [];
                inputs.forEach(i => { if (i.checked) selected.push(i.value); });
                if (selected.length === 0) return; // require selection
                answer = selected.join(', ');
            } else {
                answer = (freeInput.value || '').trim();
                if (!answer) return;
            }

            // append to QA list
            const qaList = document.getElementById('symptom-qa-list');
            const qText = document.getElementById('symptom-question').innerText || '';
            const item = document.createElement('div');
            item.className = 'symptom-qa-item';
            item.innerHTML = `<div style="font-weight:600;">Q: ${qText}</div><div style="margin-top:6px;">A: ${answer}</div>`;
            qaList.appendChild(item);
            qaList.scrollTop = qaList.scrollHeight;

            // send to server
            const action = symptomContext ? 'answer' : 'start';
            sendSymptomPayload(action, answer);
            // clear current inputs
            freeInput.value = '';
            choicesEl.innerHTML = '';
        }

        // Add inline choice buttons after last AI message
        function addChoiceButtons(choices) {
            const container = document.createElement('div');
            container.style.display = 'flex';
            container.style.flexWrap = 'wrap';
            container.style.gap = '8px';
            container.style.padding = '8px 4px';

            choices.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'question-btn';
                btn.textContent = c;
                btn.onclick = () => {
                    // show user's choice as message and send to API
                    addMsg(c, 'user');
                    sendSymptomPayload('answer', c);
                };
                container.appendChild(btn);
            });

            document.getElementById('messages').appendChild(container);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        // Toggle sidebar on mobile
        function toggleSidebar() {
            const sb = document.querySelector('.sidebar');
            if (!sb) return;
            const open = sb.classList.toggle('open');
            document.body.classList.toggle('no-scroll', open);
            // manage overlay
            let ov = document.querySelector('.sidebar-overlay');
            if (!ov) {
                ov = document.createElement('div');
                ov.className = 'sidebar-overlay';
                ov.onclick = () => toggleSidebar();
                document.body.appendChild(ov);
            }
            ov.classList.toggle('visible', open);
        }

        // Load chat history on page load
        async function loadChatHistory() {
            await loadChatSessions();
        }

        // Load history and focus input on page load
        window.addEventListener('load', () => {
            loadChatHistory();
            document.getElementById('input').focus();
        });
    </script>
</body>
</html>
