<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Health App{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #28a745; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">Afya Yako AI</a>
            <div class="d-flex gap-2">
                <a href="{% url 'chat_home' %}" class="btn btn-sm btn-light">💬 Chat</a>
                <a href="{% url 'menstrual:dashboard' %}" class="btn btn-sm btn-light">🩸 Cycle</a>
                <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-light">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center mt-5 py-3 border-top">
        <p>&copy; 2026 Health Project Tanzania</p>
    </footer>
</body>
</html>
