{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 rounded-3 animated-form-card">
                <div class="card-header bg-success text-white p-3 form-header-gradient" style="background: linear-gradient(135deg, #059669, #10b981);">
                    <h4 class="mb-0"><i class="fas fa-utensils me-2"></i>Log Nutrition</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted mb-4">Track your meals and calories to maintain a balanced diet.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">
                                    {{ field.errors.0 }}
                                </div>
                            {% endif %}
                        </div>
                        {% endfor %}

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success btn-lg">🍎 Save Meal</button>
                            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
